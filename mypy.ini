[mypy]
python_version = 3.10
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False
disallow_incomplete_defs = False
check_untyped_defs = True
ignore_missing_imports = True

[mypy-requests.*]
ignore_missing_imports = False

[mypy-pandas.*]
ignore_missing_imports = False

[mypy-psycopg2.*]
ignore_missing_imports = False

[mypy-airflow.*]
ignore_missing_imports = True
# Airflow 3 uses standard providers which might not have full py.typed in all versions
# but they have source-level type hints.
